name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create Payload
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/

      - name: Create IPA
        run: |
          cd Payload
          zip -r ../Runner.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: Runner.ipa